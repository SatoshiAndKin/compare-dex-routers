commands:
  install: npm install
  typecheck: npm run typecheck
  build: echo "No build step - uses tsx"
  test: npm test
  test_coverage: npm run test:coverage
  lint: npm run lint
  lint_fix: npm run lint:fix
  format: npm run format
  dead_code: npm run dead-code

services:
  dev:
    start: PORT=3001 npm run dev
    stop: lsof -ti :3001 | xargs kill
    healthcheck: curl -sf http://localhost:3001/health
    port: 3001
    depends_on: []
