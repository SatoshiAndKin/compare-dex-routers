commands:
  install: npm install
  typecheck: npm run typecheck
  build: echo "No build step - uses tsx"
  test: npm test
  test_coverage: npm run test:coverage
  lint: npm run lint
  lint_fix: npm run lint:fix
  format: npm run format
  dead_code: npm run dead-code

services:
  dev:
    start: PORT=3002 npm run dev
    stop: lsof -ti :3002 | xargs kill
    healthcheck: curl -sf http://localhost:3002/health
    port: 3002
    depends_on: []
