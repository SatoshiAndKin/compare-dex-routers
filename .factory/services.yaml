commands:
  install: npm install
  typecheck: npm run typecheck
  build: cd packages/frontend && npm run build
  test: cd packages/api && npm test -- --maxWorkers=7
  test-frontend: cd packages/frontend && npm test
  lint: npm run lint
  format: npm run format
  generate-types: npx openapi-typescript openapi.yaml -o packages/frontend/src/generated/api-types.d.ts

services:
  api:
    start: cd packages/api && PORT=3100 npx tsx src/server.ts
    stop: lsof -ti :3100 | xargs kill
    healthcheck: curl -sf http://localhost:3100/health
    port: 3100
    depends_on: []

  frontend:
    start: cd packages/frontend && npm run dev -- --port 5173
    stop: lsof -ti :5173 | xargs kill
    healthcheck: curl -sf http://localhost:5173
    port: 5173
    depends_on: [api]
