openapi: "3.0.3"
info:
  title: Compare DEX Routers Spandex Router
  version: "1.0.0"
  description: Compare DEX Routers quote server querying Spandex and Curve for best-priced swap quotes.

servers:
  - url: http://localhost:3000

paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /chains:
    get:
      summary: List supported chains
      operationId: getChains
      responses:
        "200":
          description: Map of chain IDs to chain metadata
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  properties:
                    name:
                      type: string
                    alchemySubdomain:
                      type: string

  /quote:
    get:
      summary: Get best Spandex quote
      operationId: getQuote
      parameters:
        - name: chainId
          in: query
          required: true
          schema:
            type: integer
          description: Chain ID (1, 8453, 42161, 10, 137, 56, 43114)
        - name: from
          in: query
          required: true
          schema:
            type: string
            pattern: "^0x[a-fA-F0-9]{40}$"
          description: Input token address
        - name: to
          in: query
          required: true
          schema:
            type: string
            pattern: "^0x[a-fA-F0-9]{40}$"
          description: Output token address
        - name: amount
          in: query
          required: true
          schema:
            type: string
          description: "Human-readable amount. For exactIn mode: input amount. For targetOut mode: desired output amount."
        - name: slippageBps
          in: query
          schema:
            type: integer
            default: 50
            minimum: 0
            maximum: 10000
          description: Slippage tolerance in basis points
        - name: sender
          in: query
          schema:
            type: string
            pattern: "^0x[a-fA-F0-9]{40}$"
          description: Sender address for approval checks
        - name: mode
          in: query
          schema:
            type: string
            enum: [exactIn, targetOut]
            default: exactIn
          description: "Quote mode. exactIn: specify input amount, get output amount. targetOut: specify desired output amount, get required input amount."
      responses:
        "200":
          description: Best quote found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpandexQuote"
        "400":
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Quote failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /compare:
    get:
      summary: Compare Spandex vs Curve quotes
      operationId: compareQuotes
      parameters:
        - name: chainId
          in: query
          required: true
          schema:
            type: integer
        - name: from
          in: query
          required: true
          schema:
            type: string
            pattern: "^0x[a-fA-F0-9]{40}$"
        - name: to
          in: query
          required: true
          schema:
            type: string
            pattern: "^0x[a-fA-F0-9]{40}$"
        - name: amount
          in: query
          required: true
          schema:
            type: string
          description: "Human-readable amount. For exactIn mode: input amount. For targetOut mode: desired output amount."
        - name: slippageBps
          in: query
          schema:
            type: integer
            default: 50
        - name: sender
          in: query
          schema:
            type: string
            pattern: "^0x[a-fA-F0-9]{40}$"
        - name: mode
          in: query
          schema:
            type: string
            enum: [exactIn, targetOut]
            default: exactIn
          description: "Quote mode. exactIn: specify input amount, compare output amounts (higher = better). targetOut: specify desired output amount, compare required input amounts (lower = better)."
      responses:
        "200":
          description: Comparison result with recommendation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompareResult"
        "400":
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /token-metadata:
    get:
      summary: Get ERC-20 token metadata from blockchain
      operationId: getTokenMetadata
      parameters:
        - name: chainId
          in: query
          required: true
          schema:
            type: integer
          description: Chain ID (1, 8453, 42161, 10, 137, 56, 43114)
        - name: address
          in: query
          required: true
          schema:
            type: string
            pattern: "^0x[a-fA-F0-9]{40}$"
          description: Token contract address
      responses:
        "200":
          description: Token metadata retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenMetadata"
        "400":
          description: Invalid parameters (missing/invalid chainId or address, unsupported chain)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not a valid ERC-20 token (EOA or non-ERC-20 contract)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: RPC error or timeout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    SpandexQuote:
      type: object
      properties:
        chainId:
          type: integer
        from:
          type: string
        from_symbol:
          type: string
        to:
          type: string
        to_symbol:
          type: string
        amount:
          type: string
        input_amount:
          type: string
          description: Human-readable input amount (relevant for targetOut mode)
        output_amount:
          type: string
          description: Human-readable output amount
        input_amount_raw:
          type: string
        output_amount_raw:
          type: string
        mode:
          type: string
          enum: [exactIn, targetOut]
        provider:
          type: string
        slippage_bps:
          type: integer
        gas_used:
          type: string
        gas_cost_eth:
          type: string
          description: Gas cost in ETH (gas_used * gas_price / 1e18)
        output_value_eth:
          type: string
          description: Output value converted to ETH (or input value for targetOut mode)
        net_value_eth:
          type: string
          description: "Net ETH value. For exactIn: output_value_eth - gas_cost_eth. For targetOut: input_value_eth + gas_cost_eth (total cost)."
        router_address:
          type: string
        router_calldata:
          type: string
        router_value:
          type: string
        approval_token:
          type: string
        approval_spender:
          type: string

    CurveQuote:
      type: object
      properties:
        source:
          type: string
          enum: [curve]
        from:
          type: string
        from_symbol:
          type: string
        to:
          type: string
        to_symbol:
          type: string
        amount:
          type: string
        input_amount:
          type: string
          description: Human-readable input amount (relevant for targetOut mode)
        output_amount:
          type: string
        mode:
          type: string
          enum: [exactIn, targetOut]
        route:
          type: array
          items:
            type: object
            properties:
              poolId:
                type: string
              poolName:
                type: string
              poolAddress:
                type: string
              inputCoinAddress:
                type: string
              outputCoinAddress:
                type: string
        route_symbols:
          type: object
          additionalProperties:
            type: string
        router_address:
          type: string
        router_calldata:
          type: string
        gas_used:
          type: string
        gas_cost_eth:
          type: string
          description: Gas cost in ETH
        output_value_eth:
          type: string
          description: Output value converted to ETH (or input value for targetOut mode)
        net_value_eth:
          type: string
          description: "Net ETH value. For exactIn: output_value_eth - gas_cost_eth. For targetOut: input_value_eth + gas_cost_eth (total cost)."

    CompareResult:
      type: object
      properties:
        spandex:
          $ref: "#/components/schemas/SpandexQuote"
          nullable: true
        spandex_error:
          type: string
          nullable: true
        curve:
          $ref: "#/components/schemas/CurveQuote"
          nullable: true
        curve_error:
          type: string
          nullable: true
        recommendation:
          type: string
          enum: [spandex, curve]
          nullable: true
        recommendation_reason:
          type: string
        gas_price_gwei:
          type: string
          nullable: true
        output_to_eth_rate:
          type: string
          nullable: true
          description: Rate used to convert output to ETH for gas-adjusted comparison (exactIn mode, null if output is ETH)
        input_to_eth_rate:
          type: string
          nullable: true
          description: Rate used to convert input to ETH for gas-adjusted comparison (targetOut mode, null if input is ETH)
        mode:
          type: string
          enum: [exactIn, targetOut]
          description: The quote mode used for this comparison

    TokenMetadata:
      type: object
      properties:
        name:
          type: string
          description: Token name from ERC-20 name() function
        symbol:
          type: string
          description: Token symbol from ERC-20 symbol() function
        decimals:
          type: integer
          description: Token decimals from ERC-20 decimals() function
