openapi: "3.0.3"
info:
  title: Compare DEX Routers Spandex Router
  version: "1.0.0"
  description: Compare DEX Routers quote server querying Spandex and Curve for best-priced swap quotes.

servers:
  - url: http://localhost:3100

paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /chains:
    get:
      summary: List supported chains
      operationId: getChains
      responses:
        "200":
          description: Map of chain IDs to chain metadata
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  properties:
                    name:
                      type: string
                    alchemySubdomain:
                      type: string

  /quote:
    get:
      summary: Get best Spandex quote
      operationId: getQuote
      parameters:
        - name: chainId
          in: query
          required: true
          schema:
            type: integer
          description: Chain ID (1, 8453, 42161, 10, 137, 56, 43114)
        - name: from
          in: query
          required: true
          schema:
            type: string
            pattern: "^0x[a-fA-F0-9]{40}$"
          description: Input token address
        - name: to
          in: query
          required: true
          schema:
            type: string
            pattern: "^0x[a-fA-F0-9]{40}$"
          description: Output token address
        - name: amount
          in: query
          required: true
          schema:
            type: string
          description: "Human-readable amount. For exactIn mode: input amount. For targetOut mode: desired output amount."
        - name: slippageBps
          in: query
          schema:
            type: integer
            default: 50
            minimum: 0
            maximum: 10000
          description: Slippage tolerance in basis points
        - name: sender
          in: query
          schema:
            type: string
            pattern: "^0x[a-fA-F0-9]{40}$"
          description: Sender address for approval checks
        - name: mode
          in: query
          schema:
            type: string
            enum: [exactIn, targetOut]
            default: exactIn
          description: "Quote mode. exactIn: specify input amount, get output amount. targetOut: specify desired output amount, get required input amount."
      responses:
        "200":
          description: Best quote found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpandexQuote"
        "400":
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Quote failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /compare:
    get:
      summary: Compare Spandex vs Curve quotes
      operationId: compareQuotes
      parameters:
        - name: chainId
          in: query
          required: true
          schema:
            type: integer
        - name: from
          in: query
          required: true
          schema:
            type: string
            pattern: "^0x[a-fA-F0-9]{40}$"
        - name: to
          in: query
          required: true
          schema:
            type: string
            pattern: "^0x[a-fA-F0-9]{40}$"
        - name: amount
          in: query
          required: true
          schema:
            type: string
          description: "Human-readable amount. For exactIn mode: input amount. For targetOut mode: desired output amount."
        - name: slippageBps
          in: query
          schema:
            type: integer
            default: 50
        - name: sender
          in: query
          schema:
            type: string
            pattern: "^0x[a-fA-F0-9]{40}$"
        - name: mode
          in: query
          schema:
            type: string
            enum: [exactIn, targetOut]
            default: exactIn
          description: "Quote mode. exactIn: specify input amount, compare output amounts (higher = better). targetOut: specify desired output amount, compare required input amounts (lower = better)."
      responses:
        "200":
          description: Comparison result with recommendation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompareResult"
        "400":
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /quote-curve:
    get:
      summary: Get a single Curve Finance quote
      operationId: getQuoteCurve
      parameters:
        - name: chainId
          in: query
          required: true
          schema:
            type: integer
          description: Chain ID (1, 8453, 42161, 10, 137, 56, 43114)
        - name: from
          in: query
          required: true
          schema:
            type: string
            pattern: "^0x[a-fA-F0-9]{40}$"
          description: Input token address
        - name: to
          in: query
          required: true
          schema:
            type: string
            pattern: "^0x[a-fA-F0-9]{40}$"
          description: Output token address
        - name: amount
          in: query
          required: true
          schema:
            type: string
          description: "Human-readable amount. For exactIn mode: input amount. For targetOut mode: desired output amount."
        - name: slippageBps
          in: query
          schema:
            type: integer
            default: 50
            minimum: 0
            maximum: 10000
          description: Slippage tolerance in basis points
        - name: sender
          in: query
          schema:
            type: string
            pattern: "^0x[a-fA-F0-9]{40}$"
          description: Sender address for approval checks and gas estimation
        - name: mode
          in: query
          schema:
            type: string
            enum: [exactIn, targetOut]
            default: exactIn
          description: "Quote mode. exactIn: specify input amount. targetOut: specify desired output amount."
      responses:
        "200":
          description: Curve quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurveQuote"
        "400":
          description: Invalid parameters or Curve not supported on this chain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Quote failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /tokenlist:
    get:
      summary: Get the default token list(s)
      operationId: getTokenlist
      description: Returns all configured default token lists merged into a single response.
      responses:
        "200":
          description: Token list response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenListResponse"
        "500":
          description: Failed to load token list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /tokenlist/proxy:
    get:
      summary: Proxy a remote token list URL
      operationId: proxyTokenlist
      description: Fetches a remote HTTPS token list URL server-side to avoid CORS issues. Validates JSON and tokens array.
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
          description: HTTPS URL of the remote token list to proxy
      responses:
        "200":
          description: Proxied token list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenListResponse"
        "400":
          description: Missing url, invalid URL format, or non-HTTPS URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Remote fetch failed, invalid JSON, missing tokens array, or response too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /token-metadata:
    get:
      summary: Get ERC-20 token metadata from blockchain
      operationId: getTokenMetadata
      parameters:
        - name: chainId
          in: query
          required: true
          schema:
            type: integer
          description: Chain ID (1, 8453, 42161, 10, 137, 56, 43114)
        - name: address
          in: query
          required: true
          schema:
            type: string
            pattern: "^0x[a-fA-F0-9]{40}$"
          description: Token contract address
      responses:
        "200":
          description: Token metadata retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenMetadata"
        "400":
          description: Invalid parameters (missing/invalid chainId or address, unsupported chain)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not a valid ERC-20 token (EOA or non-ERC-20 contract)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: RPC error or timeout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /analytics:
    get:
      summary: Get analytics summary
      operationId: getAnalytics
      description: Returns in-memory analytics about quotes processed since server start.
      responses:
        "200":
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

  /errors:
    get:
      summary: Get error insights
      operationId: getErrors
      description: Returns aggregated error patterns observed since server start.
      responses:
        "200":
          description: Error insights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorInsights"

  /metrics:
    get:
      summary: Prometheus metrics
      operationId: getMetrics
      description: Returns Prometheus-compatible metrics in text exposition format. Requires metrics_endpoint feature flag to be enabled.
      responses:
        "200":
          description: Prometheus metrics text
          content:
            text/plain:
              schema:
                type: string
                example: |
                  # HELP http_requests_total Total HTTP requests
                  # TYPE http_requests_total counter
                  http_requests_total{path="/quote",error="false"} 42

  /config:
    get:
      summary: Get server configuration
      operationId: getConfig
      description: Returns default token pairs per chain and wallet connect project ID.
      responses:
        "200":
          description: Server configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Config"

  /.well-known/farcaster.json:
    get:
      summary: Farcaster manifest
      operationId: getFarcasterManifest
      description: Returns the Farcaster mini-app manifest for frame integration.
      responses:
        "200":
          description: Farcaster manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FarcasterManifest"

components:
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    SpandexQuote:
      type: object
      properties:
        chainId:
          type: integer
        from:
          type: string
        from_symbol:
          type: string
        to:
          type: string
        to_symbol:
          type: string
        amount:
          type: string
        input_amount:
          type: string
          description: Human-readable input amount (relevant for targetOut mode)
        output_amount:
          type: string
          description: Human-readable output amount
        input_amount_raw:
          type: string
        output_amount_raw:
          type: string
        mode:
          type: string
          enum: [exactIn, targetOut]
        provider:
          type: string
        slippage_bps:
          type: integer
        gas_used:
          type: string
        gas_cost_eth:
          type: string
          description: Gas cost in ETH (gas_used * gas_price / 1e18)
        output_value_eth:
          type: string
          description: Output value converted to ETH (or input value for targetOut mode)
        net_value_eth:
          type: string
          description: "Net ETH value. For exactIn: output_value_eth - gas_cost_eth. For targetOut: input_value_eth + gas_cost_eth (total cost)."
        router_address:
          type: string
        router_calldata:
          type: string
        router_value:
          type: string
        approval_token:
          type: string
        approval_spender:
          type: string

    CurveQuote:
      type: object
      properties:
        source:
          type: string
          enum: [curve]
        from:
          type: string
        from_symbol:
          type: string
        to:
          type: string
        to_symbol:
          type: string
        amount:
          type: string
        input_amount:
          type: string
          description: Human-readable input amount (relevant for targetOut mode)
        output_amount:
          type: string
        mode:
          type: string
          enum: [exactIn, targetOut]
        route:
          type: array
          items:
            type: object
            properties:
              poolId:
                type: string
              poolName:
                type: string
              poolAddress:
                type: string
              inputCoinAddress:
                type: string
              outputCoinAddress:
                type: string
        route_symbols:
          type: object
          additionalProperties:
            type: string
        router_address:
          type: string
        router_calldata:
          type: string
        gas_used:
          type: string
        gas_cost_eth:
          type: string
          description: Gas cost in ETH
        output_value_eth:
          type: string
          description: Output value converted to ETH (or input value for targetOut mode)
        net_value_eth:
          type: string
          description: "Net ETH value. For exactIn: output_value_eth - gas_cost_eth. For targetOut: input_value_eth + gas_cost_eth (total cost)."

    CompareResult:
      type: object
      properties:
        spandex:
          $ref: "#/components/schemas/SpandexQuote"
          nullable: true
        spandex_error:
          type: string
          nullable: true
        curve:
          $ref: "#/components/schemas/CurveQuote"
          nullable: true
        curve_error:
          type: string
          nullable: true
        recommendation:
          type: string
          enum: [spandex, curve]
          nullable: true
        recommendation_reason:
          type: string
        gas_price_gwei:
          type: string
          nullable: true
        output_to_eth_rate:
          type: string
          nullable: true
          description: Rate used to convert output to ETH for gas-adjusted comparison (exactIn mode, null if output is ETH)
        input_to_eth_rate:
          type: string
          nullable: true
          description: Rate used to convert input to ETH for gas-adjusted comparison (targetOut mode, null if input is ETH)
        mode:
          type: string
          enum: [exactIn, targetOut]
          description: The quote mode used for this comparison

    TokenMetadata:
      type: object
      properties:
        name:
          type: string
          description: Token name from ERC-20 name() function
        symbol:
          type: string
          description: Token symbol from ERC-20 symbol() function
        decimals:
          type: integer
          description: Token decimals from ERC-20 decimals() function

    TokenEntry:
      type: object
      properties:
        chainId:
          type: integer
        address:
          type: string
        name:
          type: string
        symbol:
          type: string
        decimals:
          type: integer
        logoURI:
          type: string

    TokenListEntry:
      type: object
      properties:
        name:
          type: string
        tokens:
          type: array
          items:
            $ref: "#/components/schemas/TokenEntry"

    TokenListResponse:
      type: object
      properties:
        name:
          type: string
          description: Name of the token list (or "Default Tokenlists" if multiple)
        tokenlists:
          type: array
          items:
            $ref: "#/components/schemas/TokenListEntry"
        tokens:
          type: array
          description: Merged array of all tokens from all default token lists
          items:
            $ref: "#/components/schemas/TokenEntry"

    AnalyticsSummary:
      type: object
      properties:
        totalQuotes:
          type: integer
          description: Total number of quotes tracked since server start
        successRate:
          type: number
          description: Fraction of quotes that succeeded (0.0 to 1.0)
        avgDurationMs:
          type: integer
          description: Average quote duration in milliseconds
        topPairs:
          type: array
          items:
            type: object
            properties:
              pair:
                type: string
              count:
                type: integer
        topChains:
          type: array
          items:
            type: object
            properties:
              chainId:
                type: integer
              count:
                type: integer

    ErrorPattern:
      type: object
      properties:
        message:
          type: string
        count:
          type: integer
        firstSeen:
          type: string
          format: date-time
        lastSeen:
          type: string
          format: date-time
        contexts:
          type: array
          items:
            type: string

    ErrorInsights:
      type: object
      properties:
        patterns:
          type: array
          items:
            $ref: "#/components/schemas/ErrorPattern"
        totalPatterns:
          type: integer
        recurringPatterns:
          type: integer

    DefaultTokenPair:
      type: object
      properties:
        from:
          type: string
          description: Default input token address
        to:
          type: string
          description: Default output token address

    Config:
      type: object
      properties:
        defaultTokens:
          type: object
          description: Map of chainId to default token pair
          additionalProperties:
            $ref: "#/components/schemas/DefaultTokenPair"
        walletConnectProjectId:
          type: string
          description: WalletConnect project ID (empty string if not configured)

    FarcasterAccountAssociation:
      type: object
      properties:
        header:
          type: string
        payload:
          type: string
        signature:
          type: string

    FarcasterMiniapp:
      type: object
      properties:
        version:
          type: string
        name:
          type: string
        homeUrl:
          type: string
        iconUrl:
          type: string
        primaryCategory:
          type: string

    FarcasterManifest:
      type: object
      properties:
        accountAssociation:
          $ref: "#/components/schemas/FarcasterAccountAssociation"
        miniapp:
          $ref: "#/components/schemas/FarcasterMiniapp"
