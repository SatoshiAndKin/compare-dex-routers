services:
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3100
      - ALCHEMY_API_KEY=${ALCHEMY_API_KEY}
      - ZEROX_API_KEY=${ZEROX_API_KEY:-}
      - FABRIC_API_KEY=${FABRIC_API_KEY:-}
      - WALLETCONNECT_PROJECT_ID=${WALLETCONNECT_PROJECT_ID:-}
      - CURVE_ENABLED=${CURVE_ENABLED:-true}
      - COMPARE_ENABLED=${COMPARE_ENABLED:-true}
      - METRICS_ENABLED=${METRICS_ENABLED:-true}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "sh", "-c", "if [ -f /tmp/drain ]; then exit 1; fi && node -e \"fetch('http://localhost:3100/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    stop_grace_period: 35s
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`${DOMAIN:-localhost}`) && (PathPrefix(`/health`) || PathPrefix(`/chains`) || PathPrefix(`/compare`) || PathPrefix(`/quote`) || PathPrefix(`/tokenlist`) || PathPrefix(`/token-metadata`) || PathPrefix(`/metrics`) || PathPrefix(`/analytics`) || PathPrefix(`/errors`) || PathPrefix(`/config`) || PathPrefix(`/docs`) || PathPrefix(`/openapi.yaml`) || PathPrefix(`/.well-known`))
      - traefik.http.routers.api.entrypoints=web
      - traefik.http.services.api.loadbalancer.server.port=3100
      - traefik.http.routers.api.priority=10
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "if [ -f /tmp/drain ]; then exit 1; fi && wget -q --spider http://localhost/"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3
    stop_grace_period: 35s
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=Host(`${DOMAIN:-localhost}`)
      - traefik.http.routers.frontend.entrypoints=web
      - traefik.http.routers.frontend.priority=1
      - traefik.http.routers.api.priority=10
      - traefik.http.services.frontend.loadbalancer.server.port=80
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  traefik:
    external: true
