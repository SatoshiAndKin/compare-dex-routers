services:
  api:
    image: ghcr.io/satoshiandkin/compare-dex-routers-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3100
      - ALCHEMY_API_KEY=${ALCHEMY_API_KEY}
      - ZEROX_API_KEY=${ZEROX_API_KEY:-}
      - FABRIC_API_KEY=${FABRIC_API_KEY:-}
      - WALLETCONNECT_PROJECT_ID=${WALLETCONNECT_PROJECT_ID:-}
      - CURVE_ENABLED=${CURVE_ENABLED:-true}
      - COMPARE_ENABLED=${COMPARE_ENABLED:-true}
      - METRICS_ENABLED=${METRICS_ENABLED:-true}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "sh", "-c", "if [ -f /tmp/drain ]; then exit 1; fi && node -e \"fetch('http://localhost:3100/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    stop_grace_period: 35s
    networks:
      - traefik-proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.cdr-api.rule=Host(`${VIRTUAL_HOST:-localhost}`) && PathPrefix(`/api`)
      - traefik.http.routers.cdr-api.entrypoints=web
      - traefik.http.middlewares.cdr-api-strip.stripprefix.prefixes=/api
      - traefik.http.routers.cdr-api.middlewares=cdr-api-strip
      - traefik.http.services.cdr-api.loadbalancer.server.port=3100
      - traefik.http.routers.cdr-api.priority=10
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    image: ghcr.io/satoshiandkin/compare-dex-routers-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "if [ -f /tmp/drain ]; then exit 1; fi && wget -q --spider http://localhost/"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3
    stop_grace_period: 35s
    networks:
      - traefik-proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.cdr-frontend.rule=Host(`${VIRTUAL_HOST:-localhost}`)
      - traefik.http.routers.cdr-frontend.entrypoints=web
      - traefik.http.routers.cdr-frontend.priority=1
      - traefik.http.services.cdr-frontend.loadbalancer.server.port=80
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  traefik-proxy:
    external: true
    name: traefik-proxy
